name: CI

on:
  push:
    branches: [main, raft]
  pull_request:
    branches: [main]
  schedule:
    # Nightly extended fuzz / coverage at 04:17 UTC.
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  checks: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# NOTE: all `uses:` references SHOULD be pinned by full
# 40-char commit SHA, not by tag, so a malicious tag swap can't slip
# into the next CI run. Using tags here for now; replace with SHAs (and
# wire up Renovate / Dependabot to keep them current) before this CI
# is trusted to gate releases.

jobs:
  unit-tests:
    name: Unit Tests (Fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test --lib

  loom-tests:
    name: Loom Concurrency Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # The loom suite (`tests/loom_tests.rs`) is gated behind the `loom`
    # cargo feature. Without explicitly enabling it, the file compiles
    # but every model is `#[cfg(feature = "loom")]`-skipped, so
    # `cargo test --tests` runs ZERO loom models. Models like the
    # zombie-mode visibility check, HWM CAS uniqueness, and partition
    # acquire single-winner cover invariants that simple tests can't —
    # missing them in CI means a regression dropping `Acquire` ordering
    # or breaking a CAS shape ships green.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-loom-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-loom-
            ${{ runner.os }}-cargo-

      - name: Run loom models
        # Release mode is mandatory: debug loom is unbearably slow at the
        # default `LOOM_MAX_PREEMPTIONS=2` setting that this PR-time
        # smoke uses. A nightly long run can crank preemptions higher.
        env:
          LOOM_MAX_PREEMPTIONS: "2"
        run: cargo test --release --test loom_tests --features loom

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run integration tests
        # Many integration tests bind localhost ports / share /tmp paths;
        # let cargo's default (= num_cpus) and they collide on a beefy
        # runner. Cap to 4 threads — same value the e2e setup tolerated
        # without flake. Tune up after fixing the underlying collisions.
        #
        # CARGO_BUILD_JOBS=2 caps parallel rustc/lld invocations: with ~65
        # integration test binaries each statically linking the full dep
        # graph, default parallelism would SIGBUS the 7 GB runner during
        # link even with line-tables-only debuginfo (set in Cargo.toml).
        env:
          CARGO_BUILD_JOBS: "2"
        run: cargo test --tests -- --test-threads=4

  doc-tests:
    name: Doc Tests
    runs-on: ubuntu-latest
    # Doc tests previously lived in rust.yml; consolidated here so PRs
    # don't run two near-identical workflows. The unique work is `cargo
    # test --doc`; build-only checking is already covered by clippy/test.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run doc tests
        run: cargo test --doc

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  msrv:
    name: MSRV Check (1.91)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Check MSRV
        run: cargo check --all-targets

  e2e:
    name: End-to-End (cluster + kcat)
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Install kcat
        # E2E scripts drive the broker through the Kafka wire protocol via
        # kcat — same path real clients take, so a regression here is the
        # closest signal we have to "did we break the shipped binary?".
        run: sudo apt-get update && sudo apt-get install -y kcat

      - name: Build cluster binary
        run: cargo build --release -p kafkaesque-bin --bin kafkaesque

      - name: Run single-broker E2E
        env:
          KAFKAESQUE_BINARY: ./target/release/kafkaesque
          RAFT_BOOTSTRAP_EXPECT_SINGLE_NODE: "true"
        run: bash scripts/run-e2e.sh

      - name: Run cluster E2E (3 brokers, Raft)
        env:
          KAFKAESQUE_BINARY: ./target/release/kafkaesque
        run: bash scripts/run-cluster-e2e.sh

  cargo-deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    # catches both license drift (a transitive dep flipping
    # to an incompatible license) and advisories that the rustsec audit
    # job might miss because they don't yet have CVE entries.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          arguments: --all-features

  image-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    #scans the built release image for known CVEs in the
    # base layer + binaries we ship. Runs against the image we'd push,
    # not the dev image.
    needs: e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build release image
        run: docker build -f Dockerfile.minimal -t kafkaesque:ci .

      - name: Run Trivy vulnerability scanner
        # Pinned to a release tag so a `master` rewrite can't tamper with the
        # scan. Like the rest of the workflow this is tag-pinned for now;
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: kafkaesque:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  fuzz-smoke:
    name: Fuzz smoke (1 min/target)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    # keep regressions in newly added parser branches from drifting
    # — every fuzz target gets a short 1-minute libFuzzer pass on PRs.
    # Corpus is cached across runs so coverage compounds. Nightly runs
    # `fuzz-extended` for longer per-target time.
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry + fuzz target dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            fuzz/target/
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Cache fuzz corpus
        # Stable cache key so the corpus compounds across runs. Using
        # `github.run_id` would mint a new key each PR and lose the
        # accumulated corpus that gives libFuzzer its signal.
        uses: actions/cache@v4
        with:
          path: fuzz/corpus
          key: fuzz-corpus-v1
          restore-keys: |
            fuzz-corpus-

      - name: Install cargo-fuzz
        run: command -v cargo-fuzz >/dev/null 2>&1 || cargo install cargo-fuzz --locked

      - name: Run each target for 1 minute
        run: |
          set -euo pipefail
          for target_path in fuzz/fuzz_targets/*.rs; do
            target=$(basename "$target_path" .rs)
            echo "::group::fuzz-smoke $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=60
            echo "::endgroup::"
          done

      - name: Upload fuzz crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-smoke
          path: |
            fuzz/artifacts/**/crash-*
            fuzz/artifacts/**/leak-*
            fuzz/artifacts/**/timeout-*
            fuzz/artifacts/**/oom-*
          if-no-files-found: ignore
          retention-days: 30

  fuzz-extended:
    name: Fuzz extended (30 min/target, nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    # Long-form nightly fuzz: 30 min per target with `-fork=4` so each
    # target gets four parallel libFuzzer workers off the same corpus.
    # Crashes are uploaded as artifacts; the corpus shares the same
    # stable `fuzz-corpus-v1` key as `fuzz-smoke` so the two jobs feed
    # each other's coverage.
    timeout-minutes: 1200
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry + fuzz target dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            fuzz/target/
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus
          key: fuzz-corpus-v1
          restore-keys: |
            fuzz-corpus-

      - name: Install cargo-fuzz
        run: command -v cargo-fuzz >/dev/null 2>&1 || cargo install cargo-fuzz --locked

      - name: Run each target for 30 minutes (4 forks)
        run: |
          set -euo pipefail
          for target_path in fuzz/fuzz_targets/*.rs; do
            target=$(basename "$target_path" .rs)
            echo "::group::fuzz-extended $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=1800 -fork=4
            echo "::endgroup::"
          done

      - name: Upload fuzz crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-extended
          path: |
            fuzz/artifacts/**/crash-*
            fuzz/artifacts/**/leak-*
            fuzz/artifacts/**/timeout-*
            fuzz/artifacts/**/oom-*
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload merged corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-snapshot
          path: fuzz/corpus
          if-no-files-found: ignore
          retention-days: 30

  fuzz-coverage:
    name: Fuzz coverage report (quarterly)
    runs-on: ubuntu-latest
    # Manual / quarterly invocation: produces a coverage report per
    # target so untouched parser branches surface as coverage gaps the
    # corpus hasn't reached. Gated to `workflow_dispatch` so it doesn't
    # run on every nightly cron.
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 240
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (nightly + llvm-tools-preview)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry + fuzz target dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            fuzz/target/
          key: ${{ runner.os }}-cargo-fuzz-cov-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-cov-
            ${{ runner.os }}-cargo-fuzz-

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus
          key: fuzz-corpus-v1
          restore-keys: |
            fuzz-corpus-

      - name: Install cargo-fuzz
        run: command -v cargo-fuzz >/dev/null 2>&1 || cargo install cargo-fuzz --locked

      - name: Generate coverage per target
        run: |
          set -euo pipefail
          mkdir -p fuzz/coverage-report
          for target_path in fuzz/fuzz_targets/*.rs; do
            target=$(basename "$target_path" .rs)
            echo "::group::fuzz-coverage $target"
            cargo +nightly fuzz coverage "$target" || true
            if [ -f "fuzz/coverage/${target}/coverage.profdata" ]; then
              cp "fuzz/coverage/${target}/coverage.profdata" \
                 "fuzz/coverage-report/${target}.profdata"
            fi
            echo "::endgroup::"
          done

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-coverage-report
          path: fuzz/coverage-report
          if-no-files-found: ignore
          retention-days: 90

  multiarch-image:
    name: Multi-arch release image (linux/amd64,linux/arm64)
    runs-on: ubuntu-latest
    # Builds (and on tag pushes, publishes) the release image for both
    # x86_64 and arm64 so Apple Silicon devs and arm64 fleets aren't
    # stuck cross-compiling. PRs build only — no registry push.
    needs: image-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.minimal
          platforms: linux/amd64,linux/arm64
          push: false
          tags: kafkaesque:multiarch
