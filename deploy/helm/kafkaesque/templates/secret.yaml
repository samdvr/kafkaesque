{{- /*
Raft control-plane HMAC secret. Rendered only when the operator supplies
an inline value via raftAuth.clusterSecret; with raftAuth.existingSecret
the secret is created out-of-band and only referenced by the StatefulSet.
*/ -}}
{{- if and .Values.raftAuth.clusterSecret .Values.raftAuth.existingSecret }}
{{- fail "raftAuth.clusterSecret and raftAuth.existingSecret are mutually exclusive; set only one" }}
{{- end }}
{{- if not (or .Values.raftAuth.clusterSecret .Values.raftAuth.existingSecret) }}
{{- fail "Raft control-plane authentication is required: set raftAuth.existingSecret to a pre-created Secret (recommended) or raftAuth.clusterSecret to an inline value. The broker refuses to start without RAFT_CLUSTER_SECRET outside the development profile." }}
{{- end }}
{{- if .Values.raftAuth.clusterSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kafkaesque.fullname" . }}-raft-auth
  labels:
    {{- include "kafkaesque.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.raftAuth.secretKey }}: {{ .Values.raftAuth.clusterSecret | quote }}
{{- end }}
