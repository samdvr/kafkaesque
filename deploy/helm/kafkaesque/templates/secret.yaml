{{- /*
Raft control-plane secrets. Rendered only when the operator supplies inline
values via raftAuth.clusterSecret / raftAuth.joinToken; with
raftAuth.existingSecret the secret is created out-of-band and only referenced
by the StatefulSet.
*/ -}}
{{- if and .Values.raftAuth.clusterSecret .Values.raftAuth.existingSecret }}
{{- fail "raftAuth.clusterSecret and raftAuth.existingSecret are mutually exclusive; set only one" }}
{{- end }}
{{- if and .Values.raftAuth.joinToken .Values.raftAuth.existingSecret }}
{{- fail "raftAuth.joinToken and raftAuth.existingSecret are mutually exclusive; put both keys in the existing Secret" }}
{{- end }}
{{- if not (or .Values.raftAuth.clusterSecret .Values.raftAuth.existingSecret) }}
{{- fail "Raft control-plane authentication is required: set raftAuth.existingSecret to a pre-created Secret (recommended) or raftAuth.clusterSecret to an inline value. The broker refuses to start without RAFT_CLUSTER_SECRET outside the development profile." }}
{{- end }}
{{- if and .Values.raftAuth.clusterSecret (not .Values.raftAuth.joinToken) }}
{{- fail "raftAuth.joinToken is required when using inline raftAuth.clusterSecret. Set both secrets or use raftAuth.existingSecret with raft-cluster-secret and raft-join-token keys." }}
{{- end }}
{{- if and .Values.raftAuth.joinToken (not .Values.raftAuth.clusterSecret) }}
{{- fail "raftAuth.clusterSecret is required when using inline raftAuth.joinToken." }}
{{- end }}
{{- if and (gt (int .Values.replicaCount) 1) (eq .Values.config.objectStore.type "local") }}
{{- fail "replicaCount > 1 requires a shared object store (s3, gcs, or azure). Local storage is single-broker only — use values-dev.yaml or set config.objectStore.type to s3." }}
{{- end }}
{{- if .Values.raftAuth.clusterSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kafkaesque.fullname" . }}-raft-auth
  labels:
    {{- include "kafkaesque.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.raftAuth.secretKey }}: {{ .Values.raftAuth.clusterSecret | quote }}
  {{ .Values.raftAuth.joinTokenKey }}: {{ .Values.raftAuth.joinToken | quote }}
{{- end }}
