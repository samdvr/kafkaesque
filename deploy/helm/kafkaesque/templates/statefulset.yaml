apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kafkaesque.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafkaesque.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "kafkaesque.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "kafkaesque.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kafkaesque.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kafkaesque.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          {{- if eq .Values.podAntiAffinity.type "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "kafkaesque.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "kafkaesque.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
          {{- end }}
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # Use shell to extract broker ID from hostname (kafkaesque-0 -> 0)
          # and derive ADVERTISED_HOST as the pod's StatefulSet FQDN so
          # in-cluster Kafka clients can route back to this specific broker.
          # Without ADVERTISED_HOST set, the broker would advertise
          # 127.0.0.1 in Metadata responses.
          command:
            - /bin/sh
            - -c
            - |
              export BROKER_ID=$(hostname | sed 's/.*-//')
              export ADVERTISED_HOST="$(hostname).${HEADLESS_SERVICE}.${POD_NAMESPACE}.svc.cluster.local"
              exec /app/kafkaesque

          ports:
            - name: kafka
              containerPort: {{ .Values.config.kafkaPort }}
              protocol: TCP
            - name: raft
              containerPort: {{ .Values.config.raftPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.config.healthPort }}
              protocol: TCP

          envFrom:
            - configMapRef:
                name: {{ include "kafkaesque.fullname" . }}-config
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HEADLESS_SERVICE
              value: {{ include "kafkaesque.fullname" . }}-headless
            - name: RAFT_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.config.raftPort }}"
            - name: RAFT_PEERS
              value: {{ include "kafkaesque.raftPeers" . | quote }}
            # HMAC secret authenticating every Raft RPC frame. Required at
            # startup outside the development profile; must hold the same
            # value on every broker (see raftAuth in values.yaml).
            - name: RAFT_CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.raftAuth.existingSecret | default (printf "%s-raft-auth" (include "kafkaesque.fullname" .)) }}
                  key: {{ .Values.raftAuth.secretKey }}
            - name: RAFT_JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.raftAuth.existingSecret | default (printf "%s-raft-auth" (include "kafkaesque.fullname" .)) }}
                  key: {{ .Values.raftAuth.joinTokenKey }}
            {{- if .Values.tls.enabled }}
            # client-port TLS. Cert + key paths point into the
            # secret mount below. The broker reads these on start-up via
            # ClusterConfig::tls_cert_path / tls_key_path.
            - name: TLS_ENABLED
              value: "true"
            - name: TLS_CERT_PATH
              value: "{{ .Values.tls.mountPath }}/tls.crt"
            - name: TLS_KEY_PATH
              value: "{{ .Values.tls.mountPath }}/tls.key"
            {{- end }}
            {{- if .Values.raftTls.enabled }}
            # Raft mTLS. CA cert validates peer certificates
            # in both directions; same cert/key pair identifies this
            # broker to peers.
            - name: RAFT_TLS_CERT
              value: "{{ .Values.raftTls.mountPath }}/tls.crt"
            - name: RAFT_TLS_KEY
              value: "{{ .Values.raftTls.mountPath }}/tls.key"
            - name: RAFT_TLS_CA
              value: "{{ .Values.raftTls.mountPath }}/ca.crt"
            - name: RAFT_TLS_SERVER_NAME
              value: {{ .Values.raftTls.serverName | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # The endpoint controller takes ~30s to evict a terminating pod
          # from the service backing list. preStop holds the container
          # open so in-flight clients have time to drain before SIGTERM.
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.objectStore.dataPath }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.raftTls.enabled }}
            - name: raft-tls
              mountPath: {{ .Values.raftTls.mountPath }}
              readOnly: true
            {{- end }}

      volumes:
        - name: tmp
          emptyDir: {}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.certSecretName | required "tls.certSecretName is required when tls.enabled" }}
            defaultMode: 0o400
        {{- end }}
        {{- if .Values.raftTls.enabled }}
        - name: raft-tls
          secret:
            secretName: {{ .Values.raftTls.certSecretName | required "raftTls.certSecretName is required when raftTls.enabled" }}
            defaultMode: 0o400
        {{- end }}

  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "kafkaesque.labels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
