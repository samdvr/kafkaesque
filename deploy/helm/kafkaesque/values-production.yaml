# Production HA values example.
# Requires a shared object store and credentials secret.
#
#   kubectl create secret generic kafkaesque-s3-credentials -n kafkaesque \
#     --from-literal=AWS_ACCESS_KEY_ID=... \
#     --from-literal=AWS_SECRET_ACCESS_KEY=...
#
#   helm install kafkaesque ./kafkaesque -n kafkaesque --create-namespace \
#     -f values-production.yaml \
#     --set raftAuth.existingSecret=kafkaesque-raft-auth

replicaCount: 3

config:
  autoCreateTopics: false
  security:
    aclEnabled: true
    aclDenyByDefault: true
    # Remove ANONYMOUS super-user; configure SASL and ACL bindings instead.
    superUsers: ""
  objectStore:
    type: s3
    s3:
      bucket: "your-kafkaesque-bucket"
      region: "us-east-1"

extraEnvFrom:
  - secretRef:
      name: kafkaesque-s3-credentials

persistence:
  size: 50Gi

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

podDisruptionBudget:
  minAvailable: 2
