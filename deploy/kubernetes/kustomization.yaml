# Kustomization for Kafkaesque Kubernetes deployment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kafkaesque

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  # secret.yaml is intentionally omitted: it ships placeholder
  # ("CHANGE-ME") values that must never reach a real cluster. Create the
  # `kafkaesque-raft-auth` secret out-of-band before applying — see
  # secret.yaml's header comment for the recommended kubectl command. The
  # statefulset references the secret by name, so a missing secret causes
  # pod creation to fail closed instead of silently using insecure defaults.
  - networkpolicy.yaml
  - service.yaml
  - statefulset.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/name: kafkaesque
  app.kubernetes.io/version: "0.1.0"
  app.kubernetes.io/managed-by: kustomize

# Image configuration - override for your registry
images:
  - name: kafkaesque
    newName: kafkaesque
    newTag: latest
