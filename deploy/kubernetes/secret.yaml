# Shared secrets for the Raft control plane.
#
# The broker REFUSES TO START outside CLUSTER_PROFILE=development unless
# RAFT_CLUSTER_SECRET, RAFT_JOIN_TOKEN, and ACL_ENABLED are configured.
# The Raft port accepts cluster joins and coordination commands, so it must
# never run unauthenticated on a real network.
#
# !!! REPLACE THESE PLACEHOLDERS BEFORE ANY REAL DEPLOYMENT !!!
# Generate strong values and create the secret out-of-band, e.g.:
#   kubectl -n kafkaesque create secret generic kafkaesque-raft-auth \
#     --from-literal=raft-cluster-secret="$(openssl rand -base64 32)" \
#     --from-literal=raft-join-token="$(openssl rand -base64 32)"
# then remove this file from kustomization.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: kafkaesque-raft-auth
  namespace: kafkaesque
  labels:
    app.kubernetes.io/name: kafkaesque
    app.kubernetes.io/component: broker
type: Opaque
stringData:
  raft-cluster-secret: "CHANGE-ME-kafkaesque-dev-only-secret-min32b"
  raft-join-token: "CHANGE-ME-kafkaesque-join-token-dev-only-min32b"
