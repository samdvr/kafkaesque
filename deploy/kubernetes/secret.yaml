# Shared HMAC secret authenticating every Raft RPC frame.
#
# The broker REFUSES TO START without RAFT_CLUSTER_SECRET outside the
# development profile: the Raft port accepts cluster joins (auto-promoted
# to voter) and arbitrary coordination commands, so it must never run
# unauthenticated on a real network.
#
# !!! REPLACE THIS PLACEHOLDER BEFORE ANY REAL DEPLOYMENT !!!
# Generate a strong value and create the secret out-of-band, e.g.:
#   kubectl -n kafkaesque create secret generic kafkaesque-raft-auth \
#     --from-literal=raft-cluster-secret="$(openssl rand -base64 32)"
# then remove this file from kustomization.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: kafkaesque-raft-auth
  namespace: kafkaesque
  labels:
    app.kubernetes.io/name: kafkaesque
    app.kubernetes.io/component: broker
type: Opaque
stringData:
  raft-cluster-secret: "CHANGE-ME-kafkaesque-dev-only-secret"
